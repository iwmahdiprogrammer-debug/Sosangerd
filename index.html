<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>مهدی مرمزی</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root {
    --accent: #38bdf8;
    --accent2: #a855f7;
    --bg: #050816;
    --text: #e5e7eb;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #0f172a 0, #020617 40%, #000 100%);
    font-family: "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: var(--text);
  }

  /* 3D Wrapper */
  .mahdi-wrapper {
    width: 100%;
    max-width: 900px;
    perspective: 1800px;
  }

  /* 3D Card */
  .mahdi-player {
    background: rgba(15,23,42,0.85);
    border-radius: 24px;
    padding: 20px;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.9),
      0 0 0 1px rgba(148,163,184,0.25);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(148,163,184,0.35);
    transform-style: preserve-3d;
    transform: rotateY(0deg) rotateX(0deg);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  /* Hover 3D Effect */
  .mahdi-player:hover {
    transform: rotateY(12deg) rotateX(6deg);
    box-shadow:
      0 60px 120px rgba(0,0,0,0.95),
      0 0 40px rgba(56,189,248,0.4),
      0 0 60px rgba(168,85,247,0.4);
  }

  /* Header */
  .mahdi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    transform: translateZ(40px);
  }

  .mahdi-title {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: 0.08em;
  }

  .mahdi-badge {
    padding: 6px 12px;
    border-radius: 999px;
    background: radial-gradient(circle at top left, rgba(56,189,248,0.4), rgba(15,23,42,0.9));
    border: 1px solid rgba(56,189,248,0.6);
    transform: translateZ(50px);
  }

  /* 3D Video Frame */
  .mahdi-video-shell {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: #020617;
    box-shadow:
      inset 0 0 0 1px rgba(15,23,42,0.9),
      0 20px 40px rgba(0,0,0,0.7);
    transform: translateZ(60px);
  }

  video {
    width: 100%;
    display: block;
  }

  /* Neon Overlays */
  .mahdi-overlay-top,
  .mahdi-overlay-bottom {
    position: absolute;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(15,23,42,0.85);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    transform: translateZ(80px);
  }

  .mahdi-overlay-top {
    top: 10px;
    left: 10px;
  }

  .mahdi-overlay-bottom {
    bottom: 10px;
    right: 10px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
  }

  .mahdi-chip {
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(56,189,248,0.15);
    border: 1px solid rgba(56,189,248,0.5);
  }

  /* Controls */
  .controls {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transform: translateZ(40px);
  }

  .controls-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    background: radial-gradient(circle at top left, var(--accent), var(--accent2));
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #0b1120;
    box-shadow:
      0 10px 25px rgba(56,189,248,0.35),
      0 0 0 1px rgba(15,23,42,0.9);
    transition: transform 0.2s ease;
  }

  .btn:hover {
    transform: translateZ(20px) scale(1.05);
  }

  .btn-secondary {
    background: rgba(15,23,42,0.95);
    color: #e5e7eb;
    border: 1px solid rgba(148,163,184,0.6);
  }

  .download-btn {
    background: radial-gradient(circle at top left, #22c55e, #16a34a);
    color: #022c22;
  }

  .slider {
    flex: 1;
    accent-color: var(--accent);
  }

  .speed {
    background: rgba(15,23,42,0.95);
    color: #e5e7eb;
    border: 1px solid rgba(148,163,184,0.7);
    padding: 8px;
    border-radius: 999px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .btn, .btn-secondary, .download-btn, .speed {
      width: 100%;
    }
    .mahdi-title {
      font-size: 20px;
    }
    .glow-orb, .glow-orb2 {
      display: none;
    }
  }
</style>
</head>

<body>

<div class="mahdi-wrapper">
  <div class="mahdi-player">

    <div class="mahdi-header">
      <div class="mahdi-title">مهدي</div>
      <div class="mahdi-badge">M</div>
    </div>

    <div class="mahdi-video-shell">
      <video id="video" src="InShot_20260710_153629179.mp4"></video>

      <div class="mahdi-overlay-top">
        <div class="dot"></div>
        <span>Mahdi Mode</span>
      </div>

      <div class="mahdi-overlay-bottom">
        <span>Resolution</span>
        <div class="mahdi-chip"></div>
      </div>
    </div>

    <div class="controls">
      <div class="controls-row">
        <button class="btn" id="playPause">▶ Play</button>
        <button class="btn-secondary" id="fullscreen">⛶ Fullscreen</button>
        <button class="download-btn" id="downloadBtn">⬇ Download</button>
      </div>

      <div class="controls-row">
        <input type="range" id="seek" class="slider" min="0" max="100" value="0">
      </div>

      <div class="controls-row">
        <input type="range" id="volume" class="slider" min="0" max="1" step="0.05" value="1">
        <select id="speed" class="speed">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>

  </div>
</div>

<script>
  const video = document.getElementById('video');
  const playPauseBtn = document.getElementById('playPause');
  const seek = document.getElementById('seek');
  const volume = document.getElementById('volume');
  const speed = document.getElementById('speed');
  const fullscreenBtn = document.getElementById('fullscreen');
  const downloadBtn = document.getElementById('downloadBtn');

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play();
      playPauseBtn.textContent = '⏸ Pause';
    } else {
      video.pause();
      playPauseBtn.textContent = '▶ Play';
    }
  });

  video.addEventListener('timeupdate', () => {
    if (!isNaN(video.duration)) {
      seek.value = (video.currentTime / video.duration) * 100;
    }
  });

  seek.addEventListener('input', () => {
    if (!isNaN(video.duration)) {
      video.currentTime = (seek.value / 100) * video.duration;
    }
  });

  volume.addEventListener('input', () => {
    video.volume = volume.value;
  });

  speed.addEventListener('change', () => {
    video.playbackRate = speed.value;
  });

  fullscreenBtn.addEventListener('click', () => {
    if (video.requestFullscreen) {
      video.requestFullscreen();
    }
  });

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.href = video.src;
    link.download = "Mahdisosangerd.mp4";
    link.click();
  });
</script>

</body>
</html>
