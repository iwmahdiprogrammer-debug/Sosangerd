<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>مهدی مرمزی</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    background: #0f0f0f;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    color: #fff;
  }

  /* صفحه امنیتی */
  #security-screen {
    position: fixed;
    inset: 0;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
  }

  #security-screen input {
    padding: 12px;
    width: 70%;
    max-width: 300px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    text-align: center;
  }

  #security-screen button {
    background: #4ea8ff;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  #security-screen button:hover {
    background: #1f7edb;
  }

  /* پلیر */
  .mahdi-player {
    width: 95%;
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }

  .mahdi-header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    text-align: center;
    color: #4ea8ff;
  }

  video {
    width: 100%;
    border-radius: 16px;
    background: #000;
  }

  .controls {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }

  .btn {
    background: #4ea8ff;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
  }

  .btn:hover {
    background: #1f7edb;
  }

  .slider {
    flex: 1;
    min-width: 150px;
    accent-color: #4ea8ff;
  }

  .speed {
    background: #222;
    color: #fff;
    border: 1px solid #4ea8ff;
    padding: 8px;
    border-radius: 10px;
  }

  .download-btn {
    background: #16a34a;
    padding: 10px 18px;
    border-radius: 12px;
    color: #fff;
    border: none;
    cursor: pointer;
  }

  .download-btn:hover {
    background: #15803d;
  }

  @media (max-width: 600px) {
    .btn, .download-btn, .speed {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>

<body>

<!-- صفحه امنیتی -->
<div id="security-screen">
  <h2>ورود به MahdiPlayer</h2>
  <p>سؤال امنیتی: اسم صاحب این پلیر چیه؟</p>
  <input id="security-answer" placeholder="پاسخ را وارد کن">
  <button onclick="checkSecurity()">ورود</button>
  <p id="error" style="color:red; display:none;">پاسخ اشتباهه!</p>
</div>

<!-- پلیر -->
<div class="mahdi-player" id="player" style="display:none;">
  <div class="mahdi-header">مهدی </div>

  <video id="video" src="video.mp4"></video>

  <div class="controls">
    <button class="btn" id="playPause">▶ Play</button>
    <input type="range" id="seek" class="slider" min="0" max="100" value="0">
    <input type="range" id="volume" class="slider" min="0" max="1" step="0.05" value="1">

    <select id="speed" class="speed">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>

    <button class="btn" id="fullscreen">⛶ Full</button>
    <button class="download-btn" id="downloadBtn">⬇ دانلود</button>
  </div>
</div>

<script>
  // امنیت
  function checkSecurity() {
    const answer = document.getElementById("security-answer").value.trim();
    if (answer === "مهدی" || answer === "Mahdi" || answer === "mahdi") {
      document.getElementById("security-screen").style.display = "none";
      document.getElementById("player").style.display = "block";
    } else {
      document.getElementById("error").style.display = "block";
    }
  }

  // پلیر
  const video = document.getElementById('video');
  const playPauseBtn = document.getElementById('playPause');
  const seek = document.getElementById('seek');
  const volume = document.getElementById('volume');
  const speed = document.getElementById('speed');
  const fullscreenBtn = document.getElementById('fullscreen');
  const downloadBtn = document.getElementById('downloadBtn');

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play();
      playPauseBtn.textContent = '⏸ Pause';
    } else {
      video.pause();
      playPauseBtn.textContent = '▶ Play';
    }
  });

  video.addEventListener('timeupdate', () => {
    seek.value = (video.currentTime / video.duration) * 100;
  });

  seek.addEventListener('input', () => {
    video.currentTime = (seek.value / 100) * video.duration;
  });

  volume.addEventListener('input', () => {
    video.volume = volume.value;
  });

  speed.addEventListener('change', () => {
    video.playbackRate = speed.value;
  });

  fullscreenBtn.addEventListener('click', () => {
    if (video.requestFullscreen) video.requestFullscreen();
  });

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.href = video.src;
    link.download = "Mahdisosangerd-Video.mp4";
    link.click();
  });
</script>

</body>
</html>
