<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>مهدی مرمزی </title>

<style>
  body {
    background: #0f0f0f;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #fff;
  }

  .mahdi-player {
    width: 90%;
    max-width: 900px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }

  .mahdi-header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 1px;
    color: #4ea8ff;
  }

  video {
    width: 100%;
    border-radius: 16px;
    background: #000;
  }

  .controls {
    margin-top: 15px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    background: #4ea8ff;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
  }

  .btn:hover {
    background: #1f7edb;
  }

  .slider {
    flex: 1;
    accent-color: #4ea8ff;
  }

  .speed {
    background: #222;
    color: #fff;
    border: 1px solid #4ea8ff;
    padding: 8px;
    border-radius: 10px;
  }

  .download-btn {
    background: #16a34a;
    padding: 10px 18px;
    border-radius: 12px;
    color: #fff;
    border: none;
    cursor: pointer;
    transition: 0.2s;
  }

  .download-btn:hover {
    background: #15803d;
  }
</style>
</head>

<body>

<div class="mahdi-player">
  <div class="mahdi-header">مهدی</div>

  <!-- آدرس ویدیو را اینجا تغییر بده -->
  <video id="video" src="InShot_20260710_153629179.mp4"></video>

  <div class="controls">
    <button class="btn" id="playPause">▶ Play</button>
    <input type="range" id="seek" class="slider" min="0" max="100" value="0">
    <input type="range" id="volume" class="slider" min="0" max="1" step="0.05" value="1">
    <select id="speed" class="speed">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
    <button class="btn" id="fullscreen">⛶ Full</button>

    <!-- دکمه دانلود -->
    <button class="download-btn" id="downloadBtn">⬇ دانلود</button>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const playPauseBtn = document.getElementById('playPause');
  const seek = document.getElementById('seek');
  const volume = document.getElementById('volume');
  const speed = document.getElementById('speed');
  const fullscreenBtn = document.getElementById('fullscreen');
  const downloadBtn = document.getElementById('downloadBtn');

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play();
      playPauseBtn.textContent = '⏸ Pause';
    } else {
      video.pause();
      playPauseBtn.textContent = '▶ Play';
    }
  });

  video.addEventListener('timeupdate', () => {
    seek.value = (video.currentTime / video.duration) * 100;
  });

  seek.addEventListener('input', () => {
    video.currentTime = (seek.value / 100) * video.duration;
  });

  volume.addEventListener('input', () => {
    video.volume = volume.value;
  });

  speed.addEventListener('change', () => {
    video.playbackRate = speed.value;
  });

  fullscreenBtn.addEventListener('click', () => {
    if (video.requestFullscreen) video.requestFullscreen();
  });

  // قابلیت دانلود
  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.href = video.src;
    link.download = "MahdiPlayer-Video.mp4";
    link.click();
  });
</script>

</body>
</html>
