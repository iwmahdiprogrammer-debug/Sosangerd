<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>مهدی مرمزی </title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root {
    --bg: #050816;
    --card: rgba(15,23,42,0.9);
    --accent: #38bdf8;
    --accent2: #a855f7;
    --text: #e5e7eb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #0f172a 0, #020617 40%, #000 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .mahdi-wrapper {
    width: 100%;
    max-width: 960px;
    position: relative;
  }

  .glow-orb {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(56,189,248,0.35), transparent 70%);
    filter: blur(10px);
    top: -80px;
    right: -40px;
    pointer-events: none;
  }

  .glow-orb2 {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,0.35), transparent 70%);
    filter: blur(10px);
    bottom: -60px;
    left: -40px;
    pointer-events: none;
  }

  .mahdi-player {
    position: relative;
    background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(15,23,42,0.75));
    border-radius: 24px;
    padding: 20px;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.9),
      0 0 0 1px rgba(148,163,184,0.25);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(148,163,184,0.35);
    overflow: hidden;
  }

  .mahdi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .mahdi-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    color: transparent;
  }

  .mahdi-tagline {
    font-size: 12px;
    color: #9ca3af;
  }

  .mahdi-badge {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 999px;
    background: radial-gradient(circle at top left, rgba(56,189,248,0.4), rgba(15,23,42,0.9));
    border: 1px solid rgba(56,189,248,0.6);
    color: #e5e7eb;
  }

  .mahdi-video-shell {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: #020617;
    box-shadow: inset 0 0 0 1px rgba(15,23,42,0.9);
  }

  video {
    width: 100%;
    display: block;
    background: #000;
  }

  .mahdi-overlay-top {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(15,23,42,0.85);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
  }

  .mahdi-overlay-bottom {
    position: absolute;
    bottom: 10px;
    right: 10px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(15,23,42,0.85);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mahdi-chip {
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(56,189,248,0.15);
    border: 1px solid rgba(56,189,248,0.5);
    font-size: 10px;
  }

  .controls {
    margin-top: 16px;
    display: grid;
    grid-template-columns: minmax(0,1.5fr) minmax(0,1fr);
    gap: 14px;
  }

  .controls-main {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    background: radial-gradient(circle at top left, var(--accent), var(--accent2));
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    color: #0b1120;
    font-weight: 600;
    box-shadow:
      0 10px 25px rgba(56,189,248,0.35),
      0 0 0 1px rgba(15,23,42,0.9);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow:
      0 14px 30px rgba(56,189,248,0.45),
      0 0 0 1px rgba(15,23,42,0.9);
  }

  .btn-secondary {
    background: rgba(15,23,42,0.95);
    color: #e5e7eb;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.6);
    box-shadow: 0 8px 20px rgba(15,23,42,0.8);
  }

  .btn-secondary:hover {
    box-shadow: 0 12px 26px rgba(15,23,42,0.9);
  }

  .download-btn {
    background: radial-gradient(circle at top left, #22c55e, #16a34a);
    color: #022c22;
    box-shadow:
      0 10px 25px rgba(34,197,94,0.4),
      0 0 0 1px rgba(15,23,42,0.9);
  }

  .slider {
    flex: 1;
    accent-color: var(--accent);
  }

  .speed {
    background: rgba(15,23,42,0.95);
    color: #e5e7eb;
    border: 1px solid rgba(148,163,184,0.7);
    padding: 8px;
    border-radius: 999px;
    font-size: 13px;
  }

  .meta-panel {
    background: rgba(15,23,42,0.9);
    border-radius: 16px;
    padding: 12px;
    border: 1px solid rgba(31,41,55,0.9);
    box-shadow: inset 0 0 0 1px rgba(15,23,42,0.9);
    font-size: 12px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    color: #9ca3af;
  }

  .meta-row span:last-child {
    color: #e5e7eb;
  }

  @media (max-width: 720px) {
    .controls {
      grid-template-columns: minmax(0,1fr);
    }
  }

  @media (max-width: 480px) {
    .mahdi-player {
      padding: 14px;
      border-radius: 18px;
    }
    .mahdi-title {
      font-size: 18px;
    }
    .controls-row {
      flex-wrap: wrap;
    }
    .btn, .btn-secondary, .download-btn, .speed {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>

<body>

<div class="mahdi-wrapper">
  <div class="glow-orb"></div>
  <div class="glow-orb2"></div>

  <div class="mahdi-player">
    <div class="mahdi-header">
      <div>
        <div class="mahdi-title">Mahdi</div>
        <div class="mahdi-tagline">Designed for Mahdi • Ultra UI • Pro Motion</div>
      </div>
      <div class="mahdi-badge"سین</div>
    </div>

    <div class="mahdi-video-shell">
      <video id="video" src="InShot_20260710_153629179.mp4"></video>

      <div class="mahdi-overlay-top">
        <div class="dot"></div>
        <span>Live Render • Mahdi Mode</span>
      </div>

      <div class="mahdi-overlay-bottom">
        <span>Resolution</span>
        <div class="mahdi-chip"> HD</div>
      </div>
    </div>

    <div class="controls">
      <div class="controls-main">
        <div class="controls-row">
          <button class="btn" id="playPause">▶ Play</button>
          <button class="btn-secondary" id="fullscreen">⛶ Fullscreen</button>
          <button class="download-btn" id="downloadBtn">⬇ Download </button>
        </div>
        <div class="controls-row">
          <input type="range" id="seek" class="slider" min="0" max="100" value="0">
        </div>
        <div class="controls-row">
          <input type="range" id="volume" class="slider" min="0" max="1" step="0.05" value="1">
          <select id="speed" class="speed">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>
      </div>

      <div class="meta-panel">
        <div class="meta-row">
          <span>Owner</span>
          <span>Mahdi</span>
        </div>
        <div class="meta-row">
          <span>Mode</span>
          <span>special UI</span>
        </div>
        <div class="meta-row">
          <span>Download</span>
          <span>HD • Direct</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const playPauseBtn = document.getElementById('playPause');
  const seek = document.getElementById('seek');
  const volume = document.getElementById('volume');
  const speed = document.getElementById('speed');
  const fullscreenBtn = document.getElementById('fullscreen');
  const downloadBtn = document.getElementById('downloadBtn');

  playPauseBtn.addEventListener('click', () => {
    if (video.paused) {
      video.play();
      playPauseBtn.textContent = '⏸ Pause';
    } else {
      video.pause();
      playPauseBtn.textContent = '▶ Play';
    }
  });

  video.addEventListener('timeupdate', () => {
    if (!isNaN(video.duration)) {
      seek.value = (video.currentTime / video.duration) * 100;
    }
  });

  seek.addEventListener('input', () => {
    if (!isNaN(video.duration)) {
      video.currentTime = (seek.value / 100) * video.duration;
    }
  });

  volume.addEventListener('input', () => {
    video.volume = volume.value;
  });

  speed.addEventListener('change', () => {
    video.playbackRate = speed.value;
  });

  fullscreenBtn.addEventListener('click', () => {
    if (video.requestFullscreen) {
      video.requestFullscreen();
    }
  });

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.href = video.src;
    link.download = "Mahdisosangerd.mp4";
    link.click();
  });
</script>

</body>
</html>
